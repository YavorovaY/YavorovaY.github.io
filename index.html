<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yavor Yordanov</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #ffffff;
        }

        .video-section {
            min-height: 100vh;
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .hero-video {
            width: min(60vw, 520px);
            height: min(60vw, 520px);
            object-fit: cover;
            object-position: center;
            border-radius: 50%;
            display: block;
            background: #000000;
            transform: scale(0.82);
        }

        .profile-section {
            min-height: 100vh;
            background: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            text-align: center;
            max-width: 700px;
            padding: 40px;
        }

        img {
            width: 220px;
            height: 220px;
            object-fit: cover;
            border-radius: 50%;
            margin-bottom: 35px;
        }

        h1 {
            font-size: 56px;
            font-weight: 300;
            margin-bottom: 12px;
            letter-spacing: -1px;
        }

        p {
            font-size: 20px;
            color: #666;
            margin: 0;
        }
    </style>
</head>
    
<body>
    <section class="video-section">
        <video class="hero-video" autoplay muted playsinline>
            <source src="Video_WebSite_Final.mp4" type="video/mp4">
        </video>
    </section>

    <section class="profile-section">
        <div class="container">
            <img src="Yavor_Profile_Final.jpg" alt="Yavor Yordanov">

            <h1>Yavor Yordanov</h1>
            <p>PhD Candidate | Neuroimmunology | Radboudumc</p>
        </div>
    </section>
</body>
</html>
