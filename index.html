<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yavor Yordanov</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #ffffff;
        }

        .video-section {
            min-height: 100vh;
            background: #000000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .video-circle {
            width: min(58vw, 520px);
            height: min(58vw, 520px);
            border-radius: 50%;
            overflow: hidden;
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .hero-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            display: block;
        }

        .hero-text {
            text-align: center;
            margin-bottom: 50px;
            opacity: 0;
            transform: translateY(-20px);
            animation: heroTextReveal 1.0s ease-out 3.6s forwards;
        }

        .hero-name {
            font-size: 64px;
            font-weight: 300;
            letter-spacing: -1.5px;
            color: #ffffff;
            margin: 0;
            line-height: 1.0;
        }

        .hero-title {
            font-size: 28px;
            font-weight: 500;
            letter-spacing: 1px;
            color: #ee8257;
            margin-top: 18px;
        }

        @keyframes heroTextReveal {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .scroll-button {
            margin-top: 45px;
            width: 58px;
            height: 58px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.72);
            border: none;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transform: scale(0.8);
            opacity: 0;
            animation:
                revealButton 0.7s ease-out 4.6s forwards,
                pulseButton 2.2s ease-in-out 5.3s infinite;
        }

        .scroll-button::before {
            content: "";
            width: 0;
            height: 0;
            border-left: 11px solid transparent;
            border-right: 11px solid transparent;
            border-top: 16px solid #000000;
        }

        @keyframes revealButton {
            from {
                opacity: 0;
                transform: scale(0.8);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        
        @keyframes pulseButton {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.14);
            }

            100% {
                transform: scale(1);
            }
        }
        
        .about-section {
            min-height: 100vh;
            background: #ffffff;
            color: #000000;
            padding: 90px 7vw;
        }

        .about-header h2 {
            font-size: 56px;
            font-weight: 300;
            letter-spacing: -1px;
            display: inline-block;
            border-bottom: 2px solid #000000;
            padding-bottom: 10px;
            margin-bottom: 70px;
        }

        .about-content {
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }

        .about-content img {
            width: 240px;
            height: 240px;
            object-fit: cover;
            border-radius: 50%;
        }
    
    </style>
</head>
    
<body>
    <section class="video-section">
        
    <div class="hero-text">
        <h1 class = "hero-name">Yavor Yordanov</h1>
        <p class="hero-title">PhD Candidate</p>
    </div>
        
    <div class="video-circle">
        <video class="hero-video" autoplay muted playsinline>
            <source src="Video_WebSite_Short.mp4" type="video/mp4">
        </video>
    </div>

    <button class="scroll-button" onclick="document.querySelector('.about-section').scrollIntoView({behavior: 'smooth' });"></button>
        
    </section>

    <section class="about-section">
        <div class="about-header">
            <h2>About</h2>
        </div>

        <div class="about-content">
            <img src="Yavor_Profile_Final.jpg" alt="Yavor Yordanov">
        </div>
        
    </section>
</body>
</html>
